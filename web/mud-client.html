<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACK! MUD Client</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #1a1f29;
      --border: #2b3442;
      --text: #e6edf3;
      --accent: #61afef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .mud-client { min-height: 100vh; display: flex; flex-direction: column; }
    .mud-client__header { padding: 1rem; border-bottom: 1px solid var(--border); background: var(--panel); }
    .top-row { display: flex; gap: .75rem; align-items: end; flex-wrap: wrap; }
    .world-picker { display: flex; flex-direction: column; gap: .4rem; min-width: 320px; }
    label { font-weight: 600; }
    select, #connect {
      padding: .6rem; border-radius: 6px; border: 1px solid var(--border);
      background: #0b0f14; color: var(--text);
    }
    #connect { cursor: pointer; }
    .mud-client__main { flex: 1; padding: 1rem; padding-bottom: 5.5rem; }
    #terminal {
      width: 100%; min-height: 50vh; border: 1px solid var(--border); background: #000;
      border-radius: 8px; padding: .8rem; overflow-y: auto; white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .command-bar {
      position: fixed; left: 0; right: 0; bottom: 0; display: flex; gap: .75rem;
      padding: .9rem 1rem; border-top: 1px solid var(--border); background: var(--panel); z-index: 10;
    }
    #command {
      flex: 1; min-width: 0; border-radius: 6px; border: 1px solid var(--border);
      padding: .7rem; background: #0b0f14; color: var(--text);
    }
    #send {
      border: 1px solid #4e8bc7; background: var(--accent); color: #04111f;
      border-radius: 6px; padding: .7rem 1rem; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="mud-client">
    <header class="mud-client__header">
      <div class="top-row">
        <div class="world-picker">
          <label for="world">World</label>
          <select id="world" name="world"></select>
        </div>
        <button id="connect" type="button">Connect</button>
      </div>
    </header>

    <main class="mud-client__main">
      <div id="terminal" aria-live="polite"></div>
    </main>

    <form class="command-bar" id="command-form">
      <input id="command" type="text" placeholder="Enter command..." autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <script>
    (() => {
      const worldSelect = document.getElementById('world');
      const connectButton = document.getElementById('connect');
      const form = document.getElementById('command-form');
      const commandInput = document.getElementById('command');
      const terminal = document.getElementById('terminal');
      let sessionId = null;
      let pollTimer = null;

      const append = (text) => {
        if (!text) return;
        terminal.textContent += text;
        terminal.scrollTop = terminal.scrollHeight;
      };

      const setConnectedUi = (connected) => {
        connectButton.textContent = connected ? 'Disconnect' : 'Connect';
        worldSelect.disabled = connected;
      };

      async function loadWorlds() {
        const response = await fetch('/api/worlds');
        const payload = await response.json();
        worldSelect.innerHTML = '';
        for (const world of payload.worlds || []) {
          const option = document.createElement('option');
          option.value = world.target;
          option.textContent = `${world.name} (${world.target})`;
          worldSelect.appendChild(option);
        }
      }

      async function pollOutput() {
        if (!sessionId) return;
        try {
          const response = await fetch('/api/poll', { headers: { 'X-Session-Id': sessionId } });
          if (!response.ok) throw new Error('poll failed');
          const payload = await response.json();
          append(payload.output || '');
        } catch (_error) {
          append('\n[Disconnected]\n');
          sessionId = null;
          setConnectedUi(false);
          return;
        }
        pollTimer = setTimeout(pollOutput, 500);
      }

      async function connect() {
        const response = await fetch('/api/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target: worldSelect.value })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || 'connect failed');
        sessionId = payload.sessionId;
        append(`\n[Connected to ${worldSelect.value}]\n`);
        setConnectedUi(true);
        pollOutput();
      }

      async function disconnect() {
        if (pollTimer) clearTimeout(pollTimer);
        pollTimer = null;
        if (sessionId) {
          await fetch('/api/disconnect', { method: 'POST', headers: { 'X-Session-Id': sessionId } });
          append('\n[Disconnected]\n');
        }
        sessionId = null;
        setConnectedUi(false);
      }

      connectButton.addEventListener('click', async () => {
        try {
          if (sessionId) {
            await disconnect();
          } else {
            await connect();
          }
        } catch (error) {
          append(`\n[Error] ${error.message}\n`);
        }
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const command = commandInput.value.trim();
        if (!command || !sessionId) return;

        await fetch('/api/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Session-Id': sessionId
          },
          body: JSON.stringify({ command })
        });

        commandInput.value = '';
      });

      loadWorlds().catch((error) => append(`[Error] ${error.message}\n`));
    })();
  </script>
</body>
</html>
